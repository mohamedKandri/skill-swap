<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Matches — SkillSwap</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/browse.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="dashboard.html">SkillSwap</a>
    <div class="nav-links">
      <a href="profile.html">Profile</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="messages.html">Messages</a>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </nav>

  <main class="browse-page">
    <aside class="filters">
      <h3>Filter</h3>
      <label>Skill
        <input type="text" id="filter-skill" placeholder="e.g. Python" />
      </label>
      <label>Min Rating
        <select id="filter-rating">
          <option value="">Any</option>
          <option value="4">4+</option>
          <option value="3">3+</option>
        </select>
      </label>
      <label>Format
        <select id="filter-format">
          <option value="">Any</option>
          <option value="online">Online</option>
          <option value="in-person">In-person</option>
        </select>
      </label>
      <button id="apply-filters" class="btn-primary btn-full">Apply</button>
    </aside>

    <section class="matches-grid" id="matches-grid">
      <p class="loading">Loading matches...</p>
    </section>
  </main>

  <!-- Request Swap Modal -->
  <div id="swap-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Request Skill Swap</h3>
      <label>Skill to Learn
        <select id="swap-skill-select"></select>
      </label>
      <label>Proposed Date &amp; Time <span style="font-weight:400;color:var(--muted)">(optional)</span>
        <input type="datetime-local" id="swap-date" />
      </label>
      <label>Format
        <select id="swap-format">
          <option value="online">Online</option>
          <option value="in-person">In-person</option>
        </select>
      </label>
      <p id="swap-error" class="error hidden"></p>
      <div class="modal-actions">
        <button id="swap-cancel" class="btn-outline">Cancel</button>
        <button id="swap-confirm" class="btn-primary">Send Request</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/browse.js"></script>
</body>
</html>
