<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SkillSwap</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a class="brand" href="index.html">SkillSwap</a>
    <h2>Create your account</h2>

    <form id="register-form">
      <label>Full Name
        <input type="text" id="name" placeholder="Jane Doe" required />
      </label>
      <label>Email
        <input type="email" id="email" placeholder="jane@uni.edu" required />
      </label>
      <label>Password
        <input type="password" id="password" placeholder="••••••••" required />
      </label>
      <label>University <span class="optional">(optional)</span>
        <input type="text" id="university" placeholder="MIT" />
      </label>
      <div id="error-msg" class="error hidden"></div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
