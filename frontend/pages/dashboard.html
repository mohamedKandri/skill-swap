<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SkillSwap</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="dashboard.html">SkillSwap</a>
    <div class="nav-links">
      <a href="profile.html">Profile</a>
      <a href="browse.html">Browse</a>
      <a href="messages.html">Messages</a>
      <span id="notif-badge" class="badge hidden">0</span>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </nav>

  <main class="dashboard-page">
    <h1>Dashboard</h1>

    <section class="dash-section">
      <h2>Pending Requests <span id="pending-count" class="badge">0</span></h2>
      <div id="pending-list"></div>
    </section>

    <section class="dash-section">
      <h2>Upcoming Sessions</h2>
      <div id="upcoming-list"></div>
    </section>

    <section class="dash-section">
      <h2>Past Sessions</h2>
      <div id="past-list"></div>
    </section>

    <section class="dash-section">
      <h2>Top Matches</h2>
      <div id="matches-list"></div>
    </section>
  </main>

  <!-- Leave Review Modal -->
  <div id="review-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Leave a Review</h3>
      <label>Rating
        <div class="star-rating" id="star-rating">
          <span data-val="1">★</span>
          <span data-val="2">★</span>
          <span data-val="3">★</span>
          <span data-val="4">★</span>
          <span data-val="5">★</span>
        </div>
      </label>
      <label>Comment <span style="font-weight:400;color:var(--muted)">(optional)</span>
        <textarea id="review-comment" rows="3" placeholder="Share your experience…"></textarea>
      </label>
      <p id="review-error" class="error hidden"></p>
      <div class="modal-actions">
        <button id="review-cancel" class="btn-outline">Cancel</button>
        <button id="review-submit" class="btn-primary">Submit Review</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
